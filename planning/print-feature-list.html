<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Symptom Tracker Feature List</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #e7e4dc;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      img {
        width: min(100%, 8.5in);
        height: auto;
        background: white;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
      }

      @page {
        size: letter portrait;
        margin: 0;
      }

      @media print {
        body {
          display: block;
          padding: 0;
          background: white;
        }

        img {
          width: 8.5in;
          height: 11in;
          box-shadow: none;
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <img src="urticaria-tracker-feature-list.svg" alt="Simple Symptom Tracker feature list" />
  </body>
</html>
